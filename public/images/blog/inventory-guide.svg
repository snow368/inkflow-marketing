<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f0f1a"/><stop offset="100%" stop-color="#1a1a2e"/></linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <!-- Boxes -->
  <g transform="translate(600,270)" opacity="0.12">
    <rect x="-130" y="-60" width="90" height="90" rx="6" fill="none" stroke="#6366f1" stroke-width="2"/>
    <rect x="-90" y="-80" width="90" height="90" rx="6" fill="none" stroke="#8b5cf6" stroke-width="2"/>
    <rect x="-50" y="-100" width="90" height="90" rx="6" fill="none" stroke="#10b981" stroke-width="2"/>
    <rect x="-10" y="-80" width="90" height="90" rx="6" fill="none" stroke="#f59e0b" stroke-width="2"/>
    <rect x="30" y="-60" width="90" height="90" rx="6" fill="none" stroke="#ef4444" stroke-width="2"/>
  </g>
  <!-- Shelves -->
  <g transform="translate(400,300)">
    <line x1="0" y1="0" x2="400" y2="0" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
    <rect x="20" y="-30" width="60" height="30" rx="3" fill="#6366f1" opacity="0.15"/>
    <rect x="100" y="-20" width="60" height="20" rx="3" fill="#8b5cf6" opacity="0.15"/>
    <rect x="180" y="-35" width="60" height="35" rx="3" fill="#10b981" opacity="0.15"/>
    <rect x="260" y="-25" width="60" height="25" rx="3" fill="#f59e0b" opacity="0.15"/>
    <rect x="340" y="-15" width="50" height="15" rx="3" fill="#ef4444" opacity="0.15"/>
  </g>
  <!-- Low stock warning -->
  <g transform="translate(400,340)">
    <rect x="0" y="0" width="400" height="8" rx="4" fill="#1f2937"/>
    <rect x="0" y="0" width="300" height="8" rx="4" fill="#10b981" opacity="0.5"/>
    <rect x="300" y="0" width="50" height="8" rx="4" fill="#f59e0b" opacity="0.6"/>
    <rect x="350" y="0" width="50" height="8" rx="4" fill="#ef4444" opacity="0.6"/>
  </g>
  <text x="600" y="460" text-anchor="middle" fill="white" font-size="36" font-weight="700" font-family="system-ui">Tattoo Inventory Management Guide</text>
  <text x="600" y="495" text-anchor="middle" fill="#9ca3af" font-size="18" font-family="system-ui">Track supplies, low-stock alerts &amp; cost-per-session</text>
</svg>