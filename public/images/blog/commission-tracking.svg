<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f0f1a"/><stop offset="100%" stop-color="#1a1a2e"/></linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#ef4444"/></linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <!-- Chart icon -->
  <g transform="translate(600,280)" opacity="0.12">
    <rect x="-120" y="0" width="240" height="160" rx="12" fill="none" stroke="#f59e0b" stroke-width="2"/>
    <line x1="-90" y1="120" x2="-90" y2="20" stroke="#f59e0b" stroke-width="1.5"/>
    <line x1="-90" y1="120" x2="100" y2="120" stroke="#f59e0b" stroke-width="1.5"/>
    <rect x="-70" y="70" width="30" height="50" rx="3" fill="#f59e0b" opacity="0.3"/>
    <rect x="-20" y="50" width="30" height="70" rx="3" fill="#f59e0b" opacity="0.4"/>
    <rect x="30" y="30" width="30" height="90" rx="3" fill="#f59e0b" opacity="0.5"/>
    <rect x="80" y="60" width="30" height="60" rx="3" fill="#f59e0b" opacity="0.2"/>
  </g>
  <!-- Pie chart -->
  <g transform="translate(430,280)">
    <circle cx="0" cy="0" r="60" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.5"/>
    <path d="M0,-60 A60,60 0 0,1 51.96,30 L0,0 Z" fill="#f59e0b" opacity="0.3"/>
    <path d="M51.96,30 A60,60 0 0,1 -30,51.96 L0,0 Z" fill="#ef4444" opacity="0.3"/>
    <path d="M-30,51.96 A60,60 0 0,1 -60,0 L0,0 Z" fill="#10b981" opacity="0.3"/>
    <path d="M-60,0 A60,60 0 0,1 0,-60 L0,0 Z" fill="#6366f1" opacity="0.3"/>
  </g>
  <!-- Dollar signs -->
  <g transform="translate(700,300)" opacity="0.5">
    <text x="0" y="0" fill="#f59e0b" font-size="48" font-weight="bold" font-family="system-ui">$</text>
    <text x="0" y="50" fill="#f59e0b" font-size="24" font-weight="300" font-family="system-ui">70/30</text>
  </g>
  <text x="600" y="470" text-anchor="middle" fill="white" font-size="36" font-weight="700" font-family="system-ui">Multi-Artist Commission Tracking</text>
  <text x="600" y="505" text-anchor="middle" fill="#9ca3af" font-size="18" font-family="system-ui">Automated split calculations &amp; reporting</text>
