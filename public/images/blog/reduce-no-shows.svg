<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f0f1a"/><stop offset="100%" stop-color="#1a1a2e"/></linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <!-- Calendar + deposit -->
  <g transform="translate(600,270)" opacity="0.12">
    <rect x="-80" y="-90" width="160" height="180" rx="12" fill="none" stroke="#10b981" stroke-width="2"/>
    <rect x="-80" y="-90" width="160" height="35" rx="12" fill="#10b981" opacity="0.2"/>
    <line x1="-50" y1="-30" x2="50" y2="-30" stroke="#10b981" stroke-width="1.5"/>
    <line x1="-50" y1="0" x2="50" y2="0" stroke="#10b981" stroke-width="1.5"/>
    <line x1="-50" y1="30" x2="50" y2="30" stroke="#10b981" stroke-width="1.5"/>
    <line x1="-50" y1="60" x2="30" y2="60" stroke="#10b981" stroke-width="1.5"/>
    <circle cx="40" cy="-55" r="15" fill="#10b981" opacity="0.4"/>
  </g>
  <!-- Decline arrow -->
  <g transform="translate(340,280)">
    <line x1="0" y1="0" x2="120" y2="0" stroke="#ef4444" stroke-width="2" opacity="0.4"/>
    <polygon points="120,0 110,-8 110,8" fill="#ef4444" opacity="0.4"/>
    <text x="60" y="-15" text-anchor="middle" fill="#ef4444" font-size="24" font-weight="700" font-family="system-ui" opacity="0.5">80%</text>
    <text x="60" y="25" text-anchor="middle" fill="#ef4444" font-size="12" font-family="system-ui" opacity="0.4">FEWER NO-SHOWS</text>
  </g>
  <!-- Checkmark -->
  <g transform="translate(780,280)">
    <circle cx="0" cy="0" r="50" fill="none" stroke="#10b981" stroke-width="2" opacity="0.5"/>
    <polyline points="-20,0 -5,15 25,-15" fill="none" stroke="#10b981" stroke-width="3" opacity="0.6" stroke-linecap="round"/>
  </g>
  <text x="600" y="460" text-anchor="middle" fill="white" font-size="36" font-weight="700" font-family="system-ui">Reduce No-Shows with Deposits</text>
  <text x="600" y="495" text-anchor="middle" fill="#9ca3af" font-size="18" font-family="system-ui">Deposit-based booking that cuts no-shows by up to 80%</text>
</svg>